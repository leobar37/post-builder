<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GymSpace Instagram Post Builder</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'gs-orange': '#F57E24',
              'gs-orange-light': '#FF9144',
              'gs-orange-dark': '#E56614',
              'gs-dark': '#2D3C53',
              'gs-dark-light': '#3D4C63',
              'gs-dark-darker': '#1D2C43',
            },
            fontFamily: {
              display: ['Sora', 'sans-serif'],
              body: ['Manrope', 'sans-serif'],
            },
          },
        },
      };
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="/src/base.css" />
    <link rel="stylesheet" href="/src/components.css" />

    <!-- html2canvas for PNG export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  </head>
  <body class="bg-[#fffdf9] text-gray-800 font-body overflow-hidden">
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <div class="logo-icon">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M6.5 6.5h11M6.5 17.5h11M6 20v-6.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 .5.5V20M6 4v6.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V4"
                />
              </svg>
            </div>
            <div>
              <div class="logo-text">GymSpace</div>
              <div class="text-xs text-gray-400">Post Builder</div>
            </div>
          </div>
        </div>

        <div class="posts-list" id="postsList">
          <!-- Posts will be rendered here by JS -->
        </div>

        <div class="p-4 border-t border-white/10">
          <div class="text-xs text-gray-400 mb-2">Export Options</div>
          <button id="btnExportAll" class="btn btn-primary w-full text-sm">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Export All (16 PNGs)
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="toolbar-title">
            <button id="btnPrev" class="btn btn-secondary btn-icon" title="Previous">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </button>

            <div class="text-center">
              <div class="text-sm text-gray-400" id="postCounter">1 / 16</div>
              <div class="font-display font-semibold text-lg" id="postTitle">Post Title</div>
            </div>

            <button id="btnNext" class="btn btn-secondary btn-icon" title="Next">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="9 18 15 12 9 6" />
              </svg>
            </button>
          </div>

          <div class="toolbar-actions">
            <!-- Zoom Controls -->
            <div class="zoom-controls">
              <button id="btnZoomOut" class="btn btn-secondary btn-icon" title="Zoom Out">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                  <line x1="8" y1="11" x2="14" y2="11" />
                </svg>
              </button>
              <span class="zoom-value" id="zoomValue">50%</span>
              <button id="btnZoomIn" class="btn btn-secondary btn-icon" title="Zoom In">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                  <line x1="11" y1="8" x2="11" y2="14" />
                  <line x1="8" y1="11" x2="14" y2="11" />
                </svg>
              </button>
            </div>

            <div class="h-8 w-px bg-white/10"></div>

            <!-- View Toggle -->
            <button id="btnGallery" class="btn btn-secondary" title="Gallery View">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
              </svg>
              Gallery
            </button>

            <!-- Export Button -->
            <button id="btnExport" class="btn btn-primary">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Export PNG
            </button>

            <!-- Publish Button -->
            <button
              id="btnPublish"
              class="btn btn-primary"
              style="background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045)"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
              </svg>
              Publicar
            </button>
          </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area" id="canvasArea">
          <div class="post-preview-wrapper" id="previewWrapper">
            <div id="postContainer">
              <!-- Post will be rendered here by JS -->
            </div>
          </div>
        </div>

        <!-- Gallery View -->
        <div class="gallery-view" id="galleryView">
          <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery items will be rendered here by JS -->
          </div>
        </div>
      </main>
    </div>

    <!-- Export Overlay -->
    <div class="export-overlay" id="exportOverlay">
      <div class="export-modal">
        <div class="export-spinner"></div>
        <h3 class="font-display font-bold text-xl mb-2">Exporting...</h3>
        <p class="text-gray-400" id="exportStatus">Generating PNG...</p>
        <div class="progress-bar">
          <div class="progress-fill" id="exportProgress" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
